{{- if .Values.frontend.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubesentinel-ai.frontend.fullname" . }}
  labels:
    {{- include "kubesentinel-ai.frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubesentinel-ai.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubesentinel-ai.frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ include "kubesentinel-ai.frontend.imageTag" . }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080   # nginx-unprivileged
              protocol: TCP
          env:
            # nginx가 /api/* 를 백엔드 Service로 프록시 (envsubst로 치환)
            - name: BACKEND_URL
              value: "http://{{ include "kubesentinel-ai.fullname" . }}:{{ .Values.service.port }}"
          {{- if .Values.probes.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          # readOnlyRootFilesystem 유지를 위해 nginx가 쓰는 경로를 emptyDir로 제공.
          # conf.d: 엔트리포인트가 ${BACKEND_URL} 치환 결과(default.conf)를 여기에 생성한다.
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
            - { name: confd, mountPath: /etc/nginx/conf.d }
      volumes:
        - { name: tmp, emptyDir: {} }
        - { name: cache, emptyDir: {} }
        - { name: run, emptyDir: {} }
        - { name: confd, emptyDir: {} }
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
