apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubesentinel-ai.fullname" . }}
  labels:
    {{- include "kubesentinel-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubesentinel-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubesentinel-ai.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "kubesentinel-ai.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kubesentinel-ai
          image: "{{ .Values.image.repository }}:{{ include "kubesentinel-ai.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # в”Җв”Җ нҳ„мһ¬ config.LoadConfigк°Җ мқҪлҠ” env (architecture.md В§2: к°’ мЈјмһ…) в”Җв”Җ
            - name: KUBESENTINEL_AI_ENDPOINT
              value: {{ .Values.ai.endpoint | quote }}
            - name: KUBESENTINEL_AI_MODEL
              value: {{ .Values.ai.model | quote }}
            - name: KUBESENTINEL_AI_PROMETHEUS_URL
              value: {{ .Values.collector.prometheusUrl | quote }}
            - name: KUBESENTINEL_AI_LOKI_URL
              value: {{ .Values.collector.lokiUrl | quote }}
            - name: KUBESENTINEL_AI_GRAFANA_URL
              value: {{ .Values.collector.grafanaUrl | quote }}
            - name: KUBESENTINEL_AI_NOTIFIER_TYPE
              value: {{ .Values.notifier.type | quote }}
            # в”Җв”Җ лҜјк°җм •ліҙ: Secret м°ёмЎ° (нӮӨ м—Ҷмңјл©ҙ optionalлЎң л¬ҙмӢң) в”Җв”Җ
            - name: KUBESENTINEL_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesentinel-ai.secretName" . }}
                  key: aiApiKey
                  optional: true
            - name: KUBESENTINEL_AI_NOTIFIER_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesentinel-ai.secretName" . }}
                  key: notifierWebhook
                  optional: true
            - name: KUBESENTINEL_AI_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesentinel-ai.secretName" . }}
                  key: gitToken
                  optional: true
            # в”Җв”Җ м„Өм • мҳҒмҶҚнҷ” DB (architecture.md В§6 Phase A) в”Җв”Җ
            {{- if .Values.database.existingSecret }}
            - name: KUBESENTINEL_AI_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- else }}
            {{- $dsn := include "kubesentinel-ai.databaseURL" . }}
            {{- if $dsn }}
            - name: KUBESENTINEL_AI_DATABASE_URL
              value: {{ $dsn | quote }}
            {{- end }}
            {{- end }}
            # NOTE: ai.allowExternal / ai.redactSecrets / ai.providerType / gitops.* /
            # collector.logLines / logLevel мқҖ м•„м§Ғ configк°Җ envлЎң мқҪм§Җ м•ҠлҠ”лӢӨ.
            # config нҢҢмқј лЎңл”© лҳҗлҠ” м¶”к°Җ env л§Өн•‘мқҖ implementation-status.md В§6 л°ұлЎңк·ё(#3 л“ұ) м°ёмЎ°.
          {{- if .Values.probes.enabled }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
