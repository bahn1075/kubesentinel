{{- if .Values.rbac.create -}}
# Read-only ClusterRole (architecture.md §11.1).
# KubeSentinel은 "제안자"이며 클러스터를 직접 변경하지 않는다 → get/list/watch만 부여.
# Secret 읽기는 의도적으로 제외한다(architecture.md R8 / 안전 가드: Secret/RBAC default-deny).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubesentinel-ai.fullname" . }}-readonly
  labels:
    {{- include "kubesentinel-ai.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - services
      - endpoints
      - configmaps
      - namespaces
      - nodes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubesentinel-ai.fullname" . }}-readonly
  labels:
    {{- include "kubesentinel-ai.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubesentinel-ai.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "kubesentinel-ai.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
