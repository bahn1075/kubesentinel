{{- /*
외부 노출 Ingress — expose.mode 에 따라 분기.
  ingress-nginx : host 기반, ingressClassName=nginx (CSP LB가 ingress-nginx 앞단)
  tailscale     : host 없음 + tls.hosts:[hostname], ingressClassName=tailscale → <hostname>.<tailnet>.ts.net
  metallb       : Ingress 없음 (frontend Service가 LoadBalancer)
모든 모드 공통: 백엔드 webhook(/v1/alerts)은 Alertmanager가 in-cluster로 직접 호출하므로 노출하지 않음.
frontend nginx가 /api 를 백엔드로 프록시하므로 단일 백엔드(frontend svc)로 UI+API 모두 처리.
*/ -}}
{{- if and .Values.frontend.enabled (ne .Values.expose.mode "metallb") -}}
{{- $fe := include "kubesentinel-ai.frontend.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kubesentinel-ai.fullname" . }}
  labels:
    {{- include "kubesentinel-ai.labels" . | nindent 4 }}
  {{- with .Values.expose.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if eq .Values.expose.mode "tailscale" }}
  ingressClassName: tailscale
  tls:
    - hosts:
        - {{ .Values.expose.tailscaleHostname | quote }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fe }}
                port:
                  number: {{ .Values.frontend.service.port }}
  {{- else }}
  {{- with .Values.expose.ingressClassName }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.expose.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.expose.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fe }}
                port:
                  number: {{ .Values.frontend.service.port }}
  {{- end }}
{{- end }}
