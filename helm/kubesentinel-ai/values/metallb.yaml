# нҷҳкІҪ: minikube (metallb вҖ” Service type=LoadBalancerлЎң IP н• лӢ№)
# helm ... -f values.yaml -f values/metallb.yaml
image:
  repository: docker.io/bahn1075/kubesentinel-ai
  tag: latest
  pullPolicy: Always
frontend:
  image:
    repository: docker.io/bahn1075/kubesentinel-ai-front
    tag: latest
    pullPolicy: Always

ai:
  endpoint: "http://localhost:1234/v1"   # placeholder, мӢӨк°’мқҖ DB Settings
  model: "set-in-ui"

# minikubeмқҳ mock м•ҢлҰј sinkлЎң м „мҶЎ(кІҖнҶ  нҺёмқҳ). м—Ҷмңјл©ҙ л№„мӣҢл‘җл©ҙ noop.
secret:
  notifierWebhook: "http://notify-sink:8080/"

expose:
  mode: metallb
  # minikube metallb addonмқҖ лӢЁмқј н’Җ(default)мқҙлқј мЈјм„қ л¶Ҳн•„мҡ”.
  # нҠ№м • н’Җ м§Җм • мӢң: { metallb.universe.tf/address-pool: default }
  loadBalancerAnnotations: {}
