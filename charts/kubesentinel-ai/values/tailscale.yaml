# 환경: oci-oke (tailscale operator — Ingress class=tailscale → tailnet HTTPS)
# 결과 주소: https://<tailscaleHostname>.<tailnet>.ts.net
# helm ... -f values.yaml -f values/tailscale.yaml
# OKE는 cri-o라 short-name enforcing → 레지스트리 포함 FQN 필수
image:
  repository: docker.io/bahn1075/kubesentinel-ai
  tag: latest
  pullPolicy: Always
frontend:
  image:
    repository: docker.io/bahn1075/kubesentinel-ai-front
    tag: latest
    pullPolicy: Always

ai:
  endpoint: "http://lm-studio-mac:1234/v1"
  model: "set-in-ui"

tailnetEgress:
  lmStudio:
    enabled: true
    serviceName: lm-studio-mac
    tailnetFQDN: mac.tail651fca.ts.net
    port: 1234
    protocol: TCP

# OKE: in-chart postgres 미사용 — 클러스터에 이미 서비스 중인 PostgreSQL에 연결
# (postgresql.postgres.svc.cluster.local:5432). DSN은 git이 아닌 k8s Secret 참조.
postgres:
  enabled: false
database:
  existingSecret: kubesentinel-db-url   # kubesentinel ns에 별도 생성(아래 안내)
  existingSecretKey: url

expose:
  mode: tailscale
  tailscaleHostname: kubesentinel        # → kubesentinel.<tailnet>.ts.net
