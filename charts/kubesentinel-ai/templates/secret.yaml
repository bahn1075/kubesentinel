{{- if and .Values.secret.create (not .Values.secret.existingSecret) -}}
# 부트스트랩/데모용 Secret. 운영에서는 secret.existingSecret로 외부 관리 Secret을 참조하라
# (SealedSecrets / External Secrets Operator / Vault 등). architecture.md R8.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubesentinel-ai.fullname" . }}
  labels:
    {{- include "kubesentinel-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secret.aiApiKey }}
  aiApiKey: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.notifierWebhook }}
  notifierWebhook: {{ . | quote }}
  {{- end }}
  {{- with .Values.secret.gitToken }}
  gitToken: {{ . | quote }}
  {{- end }}
{{- end }}
