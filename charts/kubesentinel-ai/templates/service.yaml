apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubesentinel-ai.fullname" . }}
  labels:
    {{- include "kubesentinel-ai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kubesentinel-ai.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
