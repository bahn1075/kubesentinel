# nginx-unprivileged: 8080 리슨, non-root.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 정적 자산 캐시
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA 라우팅: 알 수 없는 경로는 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 참고: 백엔드 조회 API(/api)는 Ingress 레벨에서 백엔드 Service로 라우팅한다
    # (charts/.../templates/ingress.yaml). 단일 도메인에서 프록시가 필요하면
    # 여기서 proxy_pass로 백엔드 Service를 가리키도록 확장할 수 있다.
}
